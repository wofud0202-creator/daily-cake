<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>La Terrasse — 직원용</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:#f4f3ef;color:#1a1a1a;min-height:100vh;overscroll-behavior:none;}

.hd{background:#1F3864;color:#fff;padding:14px 16px 0;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.25);}
.hd-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.hd-title{font-size:15px;font-weight:700;}
.hd-date{font-size:11px;opacity:.7;margin-top:2px;}
.refresh{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:6px 11px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit;}
.refresh:active{opacity:.7;}
.tabs{display:flex;}
.tab{flex:1;text-align:center;padding:10px 4px;font-size:13px;font-weight:600;color:rgba(255,255,255,.45);cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;}
.tab.on{color:#fff;border-bottom-color:#FFD700;}

.content{padding:14px;max-width:680px;margin:0 auto;}
.panel{display:none;}.panel.on{display:block;}

.loading{text-align:center;padding:60px 20px;color:#aaa;font-size:13px;}
.spinner{width:28px;height:28px;border:3px solid #e0e0e0;border-top-color:#1F3864;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.err{background:#fff0f0;border:1px solid #fcc;border-radius:10px;padding:20px;text-align:center;color:#c00;font-size:13px;margin-top:16px;line-height:1.8;}

/* ── 탭1: 픽업 체크 ── */
.stat-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.stat{background:#fff;border-radius:10px;padding:10px 8px;text-align:center;border:1px solid #eee;}
.stat .n{font-size:24px;font-weight:700;line-height:1.1;}
.stat .l{font-size:11px;color:#999;margin-top:2px;}
.n-done{color:#2d6a2d;}.n-wait{color:#1F3864;}.n-all{color:#888;}

.reset-btn{width:100%;padding:9px;background:#fff;border:1px solid #e0e0e0;border-radius:8px;font-size:12px;color:#aaa;cursor:pointer;margin-bottom:12px;font-family:inherit;}
.reset-btn:active{background:#f5f5f5;}

.swipe-hint{font-size:11px;color:#aaa;text-align:center;margin-bottom:10px;}

/* 시간대 그룹 */
.time-group{margin-bottom:14px;}
.time-label{font-size:14px;font-weight:700;color:#1F3864;padding:7px 12px;background:#e8edf5;border-radius:8px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;}
.tl-count{font-size:11px;font-weight:500;color:#7a90b5;}

.bklist{display:flex;flex-direction:column;gap:6px;}

/* 스와이프 카드 컨테이너 */
.bk-wrap{position:relative;border-radius:10px;overflow:hidden;}

/* 뒤에 깔리는 완료/취소 배경 */
.bk-bg{
  position:absolute;inset:0;
  display:flex;align-items:center;
  border-radius:10px;
  pointer-events:none;
}
.bk-bg-done{background:#2d6a2d;justify-content:flex-start;padding-left:20px;}
.bk-bg-undo{background:#e07000;justify-content:flex-end;padding-right:20px;}
.bk-bg span{color:#fff;font-size:13px;font-weight:700;}

/* 실제 카드 */
.bk{
  position:relative;z-index:1;
  background:#fff;border-radius:10px;padding:12px 14px;
  border:1.5px solid #ececec;
  display:flex;align-items:flex-start;gap:12px;
  transition:transform .15s ease, border-color .2s, background .2s;
  user-select:none;touch-action:pan-y;
  will-change:transform;
}
.bk.done{background:#f0f8f0;border-color:#a8d8a8;}
.bk.cancelled{background:#f9f9f9;border-color:#e5e5e5;opacity:.5;}

/* 상태 아이콘 */
.bk-icon{width:28px;height:28px;border-radius:50%;border:2px solid #ddd;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .2s;}
.bk-icon.done{background:#2d6a2d;border-color:#2d6a2d;color:#fff;}
.bk-icon.wait{color:#ccc;}

.bk-body{flex:1;min-width:0;}
.bk-row1{display:flex;align-items:center;gap:8px;margin-bottom:3px;}
.bk-name{font-size:15px;font-weight:700;color:#1a1a1a;}
.bn-badge{display:inline-flex;align-items:center;background:#e8f4e8;color:#2d6a2d;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;flex-shrink:0;}
.bk-item{font-size:13px;color:#555;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bk-req{display:inline-block;margin-top:5px;font-size:11px;color:#b85c00;background:#fff3e0;border:1px solid #ffd8a8;padding:3px 8px;border-radius:6px;line-height:1.4;}

.cancel-hd{font-size:11px;font-weight:700;color:#c00;margin:16px 0 7px;}

/* ── 탭2: 생산 현황 ── */
.prod-wrap{background:#fff;border-radius:12px;overflow:hidden;border:1px solid #e8e8e8;margin-bottom:12px;}
.prod-hd{display:grid;grid-template-columns:1fr 64px 64px 54px 58px;background:#1F3864;color:#fff;font-size:11px;font-weight:700;text-align:center;padding:10px 12px;gap:4px;}
.prod-hd .ph-l{text-align:left;}
.prod-row{display:grid;grid-template-columns:1fr 64px 64px 54px 58px;padding:9px 12px;border-bottom:1px solid #f2f2f2;align-items:center;gap:4px;}
.prod-row:last-child{border:none;}
.pname{font-size:13px;font-weight:600;color:#222;}
.pname.dim{color:#bbb;font-weight:400;}
.pc{text-align:center;font-size:14px;font-weight:700;}
.pc-y{color:#2d6a2d;}.pc-t{color:#1F3864;font-size:15px;}.pc-e{color:#ddd;font-weight:400;font-size:13px;}
.qty-input{width:100%;text-align:center;border:1.5px solid #ccc;border-radius:6px;padding:5px 2px;font-size:14px;font-weight:700;color:#555;background:#fafafa;font-family:inherit;outline:none;}
.qty-input:focus{border-color:#1F3864;background:#f0f4ff;color:#1F3864;}
.prod-foot{display:grid;grid-template-columns:1fr 64px 64px 54px 58px;padding:10px 12px;background:#1F3864;color:#fff;font-size:13px;font-weight:700;text-align:center;gap:4px;}
.prod-foot .ph-l{text-align:left;}
.legend{display:flex;gap:14px;justify-content:center;font-size:11px;color:#999;margin-top:8px;}
.ldot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:3px;vertical-align:middle;}
.hint{background:#fff;border-radius:10px;border:1px solid #eee;padding:12px;text-align:center;font-size:12px;color:#aaa;margin-top:10px;}
.hint b{color:#1F3864;}

.save-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1F3864;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:999;white-space:nowrap;}
.save-toast.show{opacity:1;}
</style>
</head>
<body>

<div class="hd">
  <div class="hd-top">
    <div>
      <div class="hd-title">La Terrasse de Paris</div>
      <div class="hd-date" id="date-str">불러오는 중...</div>
    </div>
    <button class="refresh" onclick="loadAll()">↻ 새로고침</button>
  </div>
  <div class="tabs">
    <div class="tab on" onclick="switchTab(0)">픽업 체크</div>
    <div class="tab"    onclick="switchTab(1)">생산 현황</div>
  </div>
</div>

<div class="content">
  <div class="panel on" id="p0"><div class="loading"><div class="spinner"></div>불러오는 중...</div></div>
  <div class="panel"    id="p1"><div class="loading"><div class="spinner"></div>불러오는 중...</div></div>
</div>

<div class="save-toast" id="toast"></div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbzOi7YWHBOfdFaWuyl5XeV2Rx3qHsUKX_mckooJuv9kCqpNwHcKiGiBP8V4Yre2p_Iylg/exec';

let appData = null, pickStatus = {};

function switchTab(i) {
  document.querySelectorAll('.tab').forEach((t,j)   => t.classList.toggle('on', i===j));
  document.querySelectorAll('.panel').forEach((p,j) => p.classList.toggle('on', i===j));
}
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1800);
}
async function api(params) {
  const res = await fetch(API_URL + '?' + new URLSearchParams(params), { redirect: 'follow' });
  return res.json();
}

async function loadAll() {
  ['p0','p1'].forEach(id => {
    document.getElementById(id).innerHTML = '<div class="loading"><div class="spinner"></div>불러오는 중...</div>';
  });
  try {
    const [data, ps] = await Promise.all([
      api({ action: 'data' }),
      api({ action: 'pickup' }),
    ]);
    if (data.error) { showErr(data.error); return; }
    appData    = data;
    pickStatus = ps.status || {};
    document.getElementById('date-str').textContent = data.dateStr || '';
    renderPickup();
    renderProd();
  } catch(e) {
    showErr('네트워크 오류: ' + e.message + '<br>API_URL을 확인하세요.');
  }
}
function showErr(msg) {
  ['p0','p1'].forEach(id => document.getElementById(id).innerHTML = '<div class="err">' + msg + '</div>');
}

// ── 탭1: 픽업 체크 ──────────────────────────────────────────────
function renderPickup() {
  const conf = appData.bookings.filter(b => !b.cancelled);
  const canc = appData.bookings.filter(b =>  b.cancelled);
  const done = conf.filter(b => pickStatus[b.name + '_' + b.pickup]).length;

  let h = '<div class="stat-bar">'
    + statCard(done,            '픽업 완료', 'n-done')
    + statCard(conf.length-done, '대기 중',  'n-wait')
    + statCard(conf.length,      '전체 예약','n-all')
    + '</div>';
  h += '<button class="reset-btn" onclick="resetPickup()">픽업 상태 전체 초기화</button>';
  h += '<div class="swipe-hint">→ 오른쪽으로 밀면 완료  ·  ← 왼쪽으로 밀면 취소</div>';

  // 시간대 그룹
  const groups = {};
  for (const b of conf) {
    const t = b.pickup || '시간미정';
    if (!groups[t]) groups[t] = [];
    groups[t].push(b);
  }
  const sortedTimes = Object.keys(groups).sort((a,b) =>
    (groups[a][0].pickupNum??9999) - (groups[b][0].pickupNum??9999)
  );

  for (const time of sortedTimes) {
    const bks     = groups[time];
    const grpDone = bks.filter(b => pickStatus[b.name+'_'+b.pickup]).length;
    h += '<div class="time-group">'
       + '<div class="time-label"><span>' + esc(time) + '</span>'
       + '<span class="tl-count">' + grpDone + ' / ' + bks.length + ' 완료</span></div>'
       + '<div class="bklist">';

    for (const b of bks) {
      const key  = b.name + '_' + b.pickup;
      const chkd = !!pickStatus[key];
      h += `
        <div class="bk-wrap" id="wrap-${esc(key)}">
          <div class="bk-bg bk-bg-done"><span>✓ 완료</span></div>
          <div class="bk-bg bk-bg-undo"><span>↩ 취소</span></div>
          <div class="bk ${chkd?'done':''}" id="bk-${esc(key)}" data-key="${esc(key)}">
            <div class="bk-icon ${chkd?'done':'wait'}" id="icon-${esc(key)}">${chkd?'✓':'○'}</div>
            <div class="bk-body">
              <div class="bk-row1">
                <span class="bk-name">${esc(b.name)}</span>
                ${b.bonaeng==='O'?'<span class="bn-badge">❄ 보냉백</span>':''}
              </div>
              <div class="bk-item">${esc(b.item)}</div>
              ${b.request?`<div class="bk-req">📝 ${esc(b.request)}</div>`:''}
            </div>
          </div>
        </div>`;
    }
    h += '</div></div>';
  }

  if (canc.length) {
    h += '<div class="cancel-hd">취소건 (' + canc.length + ')</div><div class="bklist">';
    for (const b of canc) {
      h += '<div class="bk-wrap"><div class="bk cancelled"><div class="bk-body">'
         + '<div class="bk-row1"><span class="bk-name" style="text-decoration:line-through;color:#bbb">' + esc(b.name) + '</span></div>'
         + '<div class="bk-item">' + esc(b.item) + ' · ' + esc(b.pickup) + '</div>'
         + '</div></div></div>';
    }
    h += '</div>';
  }

  document.getElementById('p0').innerHTML = h;
  attachSwipe();
}

function statCard(n, label, cls) {
  return '<div class="stat"><div class="n '+cls+'">'+n+'</div><div class="l">'+label+'</div></div>';
}

// ── 스와이프 로직 ──────────────────────────────────────────────
function attachSwipe() {
  document.querySelectorAll('.bk[data-key]').forEach(card => {
    let startX = 0, startY = 0, curX = 0, dragging = false, decided = false;
    const THRESH = 80; // 완료 판정 거리(px)

    card.addEventListener('touchstart', e => {
      startX  = e.touches[0].clientX;
      startY  = e.touches[0].clientY;
      curX    = 0;
      dragging = false;
      decided  = false;
      card.style.transition = 'none';
    }, { passive: true });

    card.addEventListener('touchmove', e => {
      const dx = e.touches[0].clientX - startX;
      const dy = e.touches[0].clientY - startY;

      // 세로 스크롤이면 무시
      if (!dragging && Math.abs(dy) > Math.abs(dx) + 5) return;

      dragging = true;
      e.preventDefault(); // 가로 스와이프 시 스크롤 방지

      curX = dx;
      // 완료(오른쪽): 최대 130px / 취소(왼쪽): 최대 -100px
      const clamped = Math.max(-100, Math.min(130, dx));
      card.style.transform = `translateX(${clamped}px)`;
    }, { passive: false });

    card.addEventListener('touchend', () => {
      if (!dragging) return;
      card.style.transition = 'transform .2s ease';

      const key     = card.dataset.key;
      const isDone  = !!pickStatus[key];

      if (curX > THRESH && !isDone) {
        // → 완료 처리
        card.style.transform = 'translateX(0)';
        applyPickup(key, true);
      } else if (curX < -THRESH && isDone) {
        // ← 완료 취소
        card.style.transform = 'translateX(0)';
        applyPickup(key, false);
      } else {
        card.style.transform = 'translateX(0)';
      }
      dragging = false;
    });
  });
}

function applyPickup(key, newVal) {
  pickStatus[key] = newVal;

  const card = document.getElementById('bk-' + key);
  const icon = document.getElementById('icon-' + key);
  if (card) card.classList.toggle('done', newVal);
  if (icon) {
    icon.classList.toggle('done', newVal);
    icon.classList.toggle('wait', !newVal);
    icon.textContent = newVal ? '✓' : '○';
  }

  const conf = appData.bookings.filter(b => !b.cancelled);
  const done = conf.filter(b => pickStatus[b.name+'_'+b.pickup]).length;
  document.querySelector('.n-done').textContent = done;
  document.querySelector('.n-wait').textContent = conf.length - done;

  // 시간대 카운터 갱신
  document.querySelectorAll('.time-group').forEach(grp => {
    const bkEls = grp.querySelectorAll('.bk[data-key]');
    const total  = bkEls.length;
    const grpDone = [...bkEls].filter(el => pickStatus[el.dataset.key]).length;
    const counter = grp.querySelector('.tl-count');
    if (counter) counter.textContent = grpDone + ' / ' + total + ' 완료';
  });

  toast(newVal ? '✓ 픽업 완료' : '↩ 픽업 취소');
  api({ action: 'setPickup', key, checked: newVal });
}

async function resetPickup() {
  if (!confirm('픽업 상태를 전체 초기화할까요?')) return;
  pickStatus = {};
  await api({ action: 'resetPickup' });
  renderPickup();
  toast('초기화 완료');
}

// ── 탭2: 생산 현황 ──────────────────────────────────────────────
function renderProd() {
  let tj=0, th=0, ty=0, tt=0;
  let h = '<div class="prod-wrap">'
        + '<div class="prod-hd"><div class="ph-l">품목</div><div>조각</div><div>현장</div><div>예약</div><div>합계</div></div>';

  for (const item of appData.items) {
    tj+=item.jogak; th+=item.hyunjang; ty+=item.yeyak;
    const total = item.jogak + item.hyunjang + item.yeyak;
    tt += total;
    h += '<div class="prod-row">'
       + '<div class="pname'+(total===0?' dim':'')+'">'+esc(item.name)+'</div>'
       + qtyCell(item.name,'jogak',    item.jogak)
       + qtyCell(item.name,'hyunjang', item.hyunjang)
       + '<div class="pc pc-y">'+(item.yeyak?item.yeyak:'<span class="pc-e">-</span>')+'</div>'
       + '<div class="pc pc-t">'+(total     ?total     :'<span class="pc-e">-</span>')+'</div>'
       + '</div>';
  }

  h += '<div class="prod-foot"><div class="ph-l">합  계</div><div>'+tj+'</div><div>'+th+'</div><div>'+ty+'</div><div>'+tt+'</div></div>'
     + '</div>'
     + '<div class="legend">'
     + '<span><span class="ldot" style="background:#aaa"></span>조각</span>'
     + '<span><span class="ldot" style="background:#0070C0"></span>현장</span>'
     + '<span><span class="ldot" style="background:#2d6a2d"></span>예약</span>'
     + '</div>'
     + '<div class="hint">조각·현장 수량 입력 후 엔터 → <b>Google Sheets 자동 저장</b></div>';

  document.getElementById('p1').innerHTML = h;
}

function qtyCell(name, type, val) {
  return '<div><input class="qty-input" type="number" min="0" value="'+val
       + '" onchange="saveQty(\''+esc(name)+'\',\''+type+'\',this.value,this)"'
       + ' onfocus="this.select()"></div>';
}

async function saveQty(item, type, value, el) {
  el.style.opacity = '.5';
  const res = await api({ action:'updateQty', item, type, value: Number(value) });
  el.style.opacity = '1';
  if (res.ok) {
    toast('저장 완료 ✓');
    const t = appData.items.find(i => i.name === item);
    if (t) { t[type] = Number(value); updateFooter(); }
  } else {
    toast('저장 실패: ' + (res.error||''));
  }
}

function updateFooter() {
  let tj=0,th=0,ty=0,tt=0;
  for (const i of appData.items) { tj+=i.jogak; th+=i.hyunjang; ty+=i.yeyak; tt+=i.jogak+i.hyunjang+i.yeyak; }
  const c = document.querySelectorAll('.prod-foot div');
  if (c[1]) c[1].textContent=tj;
  if (c[2]) c[2].textContent=th;
  if (c[3]) c[3].textContent=ty;
  if (c[4]) c[4].textContent=tt;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

loadAll();
</script>
</body>
</html>
